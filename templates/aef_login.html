{% extends 'base.html' %}

{% block title %}AEF Login - CipherDoc{% endblock %}

{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('auth.home') }}">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="navbar-logo">
            CipherDoc
        </a>
        <div class="navbar-nav ms-auto flex-row align-items-center gap-3">
            <a class="nav-link" href="{{ url_for('auth.home') }}">
                <i class="fas fa-home me-1"></i>Home
            </a>
            <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme">
                <i class="fas fa-sun theme-icon"></i>
            </button>
        </div>
    </div>
</nav>
{% endblock %}

{% block content %}
<div class="container py-5 fade-in">
    <div class="row justify-content-center align-items-stretch gx-5">
        <div class="col-lg-5 d-flex">
            <div class="card p-4 w-100">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <div class="logo-container mx-auto mb-3" style="width: 80px; height: 80px;">
                            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="img-fluid drop-shadow">
                        </div>
                        <h3 class="fw-bold login-title">
                            Faculty Login
                        </h3>
                        <p class="subtitle-text">Secure Paper Decryption Portal</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('auth.aef_login') }}">
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="fas fa-envelope me-2 text-accent"></i>Email Address
                            </label>
                            <input type="email" name="email" class="form-control" required placeholder="Enter your email">
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">
                                <i class="fas fa-lock me-2 text-accent"></i>Password
                            </label>
                            <div class="password-field-wrapper">
                                <input type="password" name="password" class="form-control password-toggle-input" required placeholder="Enter your password">
                                <span class="password-toggle-icon" onclick="togglePasswordVisibility(this)" title="Show password">
                                    <i class="fas fa-eye"></i>
                                </span>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-sign-in-alt me-2"></i>Login to Dashboard
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="text-muted mb-0">
                            Don't have an account?
                            <a href="{{ url_for('auth.aef_signup') }}" class="text-decoration-none" style="color: var(--accent);">
                                <i class="fas fa-user-plus me-1"></i>Register here
                            </a>
                        </p>
                    </div>
                    
                    <hr class="my-4">
                    
                    <div class="text-center">
                        <p class="small text-muted mb-2">
                            <i class="fas fa-user-shield me-1"></i>Authorized Access Only
                        </p>
                        <div class="d-flex justify-content-center gap-3">
                            <span class="badge-encrypted">
                                <i class="fas fa-lock me-1"></i>Encrypted
                            </span>
                            <span class="badge-active">
                                <i class="fas fa-check me-1"></i>Secure
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-7 d-none d-lg-flex align-items-stretch justify-content-center">
            <div class="w-100 d-flex align-items-center justify-content-center">
                <img src="{{ url_for('static', filename='images/login_logo.jpg') }}" alt="Login illustration" class="img-fluid rounded-4 shadow-lg" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
        </div>
    </div>
</div>
{% endblock %}
